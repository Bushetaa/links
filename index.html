<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherif Thabit - QR</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .qr-img {
            width: 300px;
            height: 300px;
            border: 2px solid #000;
            border-radius: 4px;
            object-fit: contain;
            display: block;
        }

        .url-input {
            width: 360px;
            max-width: 90vw;
            padding: 10px 14px;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        .url-input:focus {
            border-color: #000;
        }

        .btn {
            padding: 10px 28px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }

        .hint {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            line-height: 1.7;
            max-width: 340px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <img id="qrImg" class="qr-img" src="" alt="QR Code">
    <input id="urlInput" class="url-input" type="text" placeholder="https://bushetaa.github.io/links/">
    <button class="btn" onclick="generate()">Generate</button>
    <p class="hint">
        1. ارفع صفحة اللينكات على GitHub Pages<br>
        2. حط اللينك هنا واضغط Generate<br>
        3. كليك يمين على الصورة → Save image as<br>
        4. حطها في الـ CV
    </p>
</div>

<script>
    // لينك مؤقت — بدّله بعد ما ترفع الصفحة
    const DEFAULT_URL = 'http://sherif-thabit.me/links/';

    const qrImg = document.getElementById('qrImg');
    const urlInput = document.getElementById('urlInput');
    urlInput.value = DEFAULT_URL;

    function generate() {
        const url = urlInput.value.trim();
        if (!url) return;
        // API بيزود كيو ار كود نضف مربع تمام بلا أي حواف زايدة
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=${encodeURIComponent(url)}&margin=0&format=png&color=000000&bgcolor=FFFFFF`;
    }

    // توليد تلقائي أول ما الصفحة تفتح
    generate();
</script>

</body>
</html>
