<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .page {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }
        .header { text-align: center; }
        .avatar {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 12px;
        }
        .avatar span { font-size: 28px; font-weight: 700; color: #fff; }
        .header h1 { font-size: 22px; font-weight: 700; color: #000; }
        .header p { font-size: 13px; color: #888; margin-top: 4px; }
        .links { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .link-item {
            display: flex; align-items: center; gap: 14px;
            width: 100%; padding: 14px 18px;
            border: 1.5px solid #e0e0e0; border-radius: 10px;
            text-decoration: none; color: #000;
            transition: border-color 0.2s, background 0.2s;
        }
        .link-item:hover { border-color: #000; background: #fafafa; }
        .link-item:active { transform: scale(0.985); }
        .link-icon {
            width: 38px; height: 38px; border-radius: 8px;
            background: #f5f5f5;
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0; transition: background 0.2s;
        }
        .link-item:hover .link-icon { background: #000; }
        .link-icon i { font-size: 17px; color: #333; transition: color 0.2s; }
        .link-item:hover .link-icon i { color: #fff; }
        .link-text { display: flex; flex-direction: column; gap: 2px; }
        .link-text .label { font-size: 14px; font-weight: 600; color: #000; }
        .link-text .sub { font-size: 11.5px; color: #888; }
        .link-arrow { margin-left: auto; color: #ccc; font-size: 13px; transition: color 0.2s; }
        .link-item:hover .link-arrow { color: #000; }
    </style>
</head>
